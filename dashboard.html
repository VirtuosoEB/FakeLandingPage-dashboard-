<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="style(mobile).css" media="(max-width: 768px)">
  <link rel="stylesheet" href="style.css" media="(min-width: 769px)">
</head>

<body>
  <h1>
    Dashboard
  </h1>
  <div id="phonePreview"><iframe id="content" src="./previews/preview.html">
  </iframe>
  </div>

  <button id="saveButton">Save changes</button>
  
  
  <!-- popups -->

  <!-- Text Popup-->
  <div id="textPopup">
    <p>Font size:</p>
    <input type="number" min="0" max="100" step="1" id="tPFS" value="16">
    
    <p>Color:</p>
    <input type="color" id="colorPicker" value="#ff0000">
    <input type="text" id="colorHex" value="#ff0000">
    <button id="confirm">
      confirm
    </button>
    <button id="cancel">
      cancel
    </button>
  </div>
  
  <div id="backgroundPopup">
    <p>Color:</p>
    <input type="color" id="bColorPicker" value="#ff0000">
    <input type="text" id="bColorHex" value="#ff0000">
    <button id="bConfirm">
      confirm
    </button>
    <button id="bCancel">
      cancel
    </button>
  </div>

  <div id="btnPopup">
    <p>Font size:</p>
    <input type="number" min="0" max="100" step="1" id="btnTPFS" value="16">
    
    <p>Color:</p>
    <input type="color" id="btnColorPicker" value="#ff0000">
    <input type="text" id="btnColorHex" value="#ff0000">

     <p>background Color:</p>
    <input type="color" id="btnBColorPicker" value="#ff0000">
    <input type="text" id="btnBColorHex" value="#ff0000">
    <button id="btnConfirm">
      confirm
    </button>
    <button id="btnCancel">
      cancel
    </button>
  </div>
  
  <script type="module" src="./dashboard.js"></script>
</body>

</html>
